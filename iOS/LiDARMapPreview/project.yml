name: LiDARMapPreview
options:
  minimumXcodeGenVersion: 2.45.0
  defaultConfig: Debug
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.xy.LiDARMapPreview
    PRODUCT_NAME: LiDARMapPreview
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    TARGETED_DEVICE_FAMILY: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: U69MC68Q72
targets:
  LiDARMapPreview:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Config/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: LiDAR Map Preview
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: Used to capture the room and build a LiDAR map preview.
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
